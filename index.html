<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometric Dark Background</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-container">
        <div id="shape-wrapper" aria-hidden="true">
            <!-- Top-left cluster -->
            <div class="shape shape--tl1"></div>
            <div class="shape shape--tl2"></div>
        
            <div class="shape shape--tl4"></div>
            <div class="shape shape--tl5"></div>

            <!-- Bottom-right cluster -->
            <div class="shape shape--br3"></div>
            <div class="shape shape--br4"></div>
            <div class="shape shape--tl6"></div>

            <!-- Right-side accent -->
            <div class="shape shape--r1"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
