<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometric Dark Background</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-container">
        <div id="shape-wrapper" aria-hidden="true">
            <!-- Top-left cluster -->    
            <!-- <div class="shape shape--tl4"></div>
            <div class="shape shape--tl5"></div> -->
            <div class="shape shape--t16"></div>
            <div class="shape shape--t17"></div>
            <div class="shape shape--t18"></div>
            <div class="shape shape--t19"></div>
            <div class="shape shape--t20"></div>
            <div class="shape shape--t21"></div>
 
            <!-- Bottom-right cluster -->
            <div class="shape shape--br4"></div>
            <div class="shape shape--br5"></div>
            <div class="shape shape--br6"></div>
            <div class="shape shape--br7"></div>
            <div class="shape shape--br8"></div>
            <div class="shape shape--br9"></div>
            <!-- Right-side accent -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
